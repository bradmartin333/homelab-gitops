apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: tailscale-operator
  namespace: tailscale
spec:
  interval: 1h
  chart:
    spec:
      chart: tailscale-operator
      version: "1.x"
      sourceRef:
        kind: HelmRepository
        name: tailscale
  # No oauth values set: the chart then expects a pre-existing Secret named
  # `operator-oauth` in this namespace (see README bootstrap runbook).
  values: {}
