apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: splash
spec:
  ingressClassName: traefik
  rules:
    # No `host:` — this is the default catch-all, so http://<host-ip>/ (or a
    # `homelab` DNS entry pointing at the node) lands on the splash page.
    - http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: splash
                port:
                  number: 80
