apiVersion: apps/v1
kind: Deployment
metadata:
  name: adminer
  namespace: postgres
spec:
  replicas: 1
  selector:
    matchLabels:
      app: adminer
  template:
    metadata:
      labels:
        app: adminer
    spec:
      containers:
        - name: adminer
          image: adminer:5 # {"$imagepolicy": "flux-system:adminer"}
          ports:
            - containerPort: 8080
          env:
            # pre-fill the server field with the in-cluster Postgres DNS name
            - name: ADMINER_DEFAULT_SERVER
              value: postgres.postgres.svc.cluster.local
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              memory: 128Mi
---
# ClusterIP for in-cluster use.
apiVersion: v1
kind: Service
metadata:
  name: adminer
  namespace: postgres
spec:
  selector:
    app: adminer
  ports:
    - port: 8080
      targetPort: 8080
---
# Tailscale-only exposure over HTTPS. The operator's `tailscale` IngressClass
# gives this its own tailnet device + MagicDNS name and serves it with a valid
# Tailscale-issued *.ts.net TLS cert (requires HTTPS certs enabled on the
# tailnet). Reachable only from devices on the tailnet — not LAN, not public.
# Loads cleanly in any browser (no plain-HTTP / HTTPS-First-Mode issue).
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: adminer
  namespace: postgres
spec:
  ingressClassName: tailscale
  defaultBackend:
    service:
      name: adminer
      port:
        number: 8080
  tls:
    # The operator uses this host as the device name and cert domain. It must
    # be a bare label; the operator appends your tailnet's MagicDNS suffix.
    - hosts:
        - adminer
